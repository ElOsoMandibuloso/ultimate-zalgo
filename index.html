<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Zalgo Definitivo</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent: #bb86fc;
            --accent-hover: #9965f4;
            --border: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            position: relative;
        }
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #2c2c2c;
            color: var(--text-color);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 5px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            margin-top: 0;
            margin-right: 80px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            h1 { margin-right: 0; margin-bottom: 10px; }
            .lang-selector {
                position: static;
                display: block;
                margin: 0 auto 15px auto;
            }
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #2c2c2c;
            color: var(--text-color);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 10px;
            font-size: 16px;
            resize: vertical;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #outputOverlay {
            display: none;
            position: absolute;
            top: 1px;
            left: 1px;
            width: calc(100% - 2px);
            height: calc(100% - 2px);
            padding: 10px;
            font-size: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            pointer-events: none;
            overflow: visible;
            white-space: pre-wrap;
            word-break: break-word;
            box-sizing: border-box;
            z-index: 100;
        }
        .text-transparent {
            color: transparent !important;
            caret-color: var(--text-color);
        }
        .controls {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 5px;
            position: relative;
        }
        .realtime-toggle {
            position: absolute;
            top: -12px;
            right: 15px;
            background: var(--panel-bg);
            padding: 0 10px;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 15px;
        }
        .realtime-toggle input {
            accent-color: var(--accent);
            cursor: pointer;
        }
        .slider-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .slider-group label {
            width: 80px;
            font-weight: bold;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 15px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        input[type="number"] {
            width: 80px;
            background-color: #2c2c2c;
            color: var(--text-color);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 5px;
            font-size: 14px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            flex-grow: 1;
        }
        button:hover {
            background-color: var(--accent-hover);
        }
        .btn-secondary {
            background-color: #555;
            color: white;
        }
        .btn-secondary:hover {
            background-color: #666;
        }
        .options-panel {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background-color: #252525;
            border: 1px solid var(--border);
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
        }
        .char-category {
            margin-bottom: 15px;
        }
        .char-category h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: var(--accent);
        }
        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .category-header h3 {
            margin: 0;
        }
        .category-actions {
            display: flex;
            gap: 5px;
        }
        .category-actions button {
            flex-grow: 0;
            padding: 5px 10px;
            font-size: 12px;
            background-color: #444;
            color: #fff;
        }
        .category-actions button:hover {
            background-color: #555;
        }
        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 5px;
        }
        .char-item {
            display: flex;
            align-items: center;
            background: #333;
            padding: 3px;
            border-radius: 3px;
            cursor: pointer;
        }
        .char-item:hover {
            background: #444;
        }
        .char-item input {
            margin-right: 5px;
            cursor: pointer;
        }
        .char-item span {
            font-size: 20px;
            line-height: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <select id="langSelector" class="lang-selector" onchange="changeLanguage(this.value)">
        <option value="es">Español</option>
        <option value="en">English</option>
    </select>

    <h1 data-i18n="title">G̸E̵N̸E̵R̶A̵D̷O̵R̶ ̶Z̷A̵L̸G̷O̵</h1>
    
    <div class="grid">
        <div>
            <label for="inputText"><strong data-i18n="normalText">Texto Normal:</strong></label>
            <textarea id="inputText" data-i18n-ph="normalPh" placeholder="Escribe aquí el texto..."></textarea>
        </div>
        <div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px;">
                <label for="outputText"><strong data-i18n="zalgoText">Texto Zalgo:</strong></label>
                <label id="overlapWrapper" style="font-size: 13px; color: var(--accent); cursor: pointer;" title="Permite que el texto rompa los límites de la caja">
                    <input type="checkbox" id="overlapToggle" onchange="toggleOverlap()"> <span data-i18n="overlap">Desbordar</span>
                </label>
            </div>
            <div style="position: relative; height: 150px;">
                <textarea id="outputText" readonly data-i18n-ph="zalgoPh" placeholder="A̵q̸u̷í̷ ̸a̵p̵a̵r̵e̷c̷e̶ ̴l̶a̷ ̷m̶a̷g̷i̶a̴.̶.̷.̸" style="height: 100%; resize: none;"></textarea>
                <div id="outputOverlay"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <label class="realtime-toggle" id="realtimeWrapper" title="Actualiza el texto automáticamente al cambiar algo">
            <input type="checkbox" id="realtimePreview" checked>
            <span data-i18n="realtime">Tiempo real</span>
        </label>
        
        <div class="slider-group">
            <label data-i18n="up">Arriba:</label>
            <input type="range" id="slideUp" min="0" max="100" value="5">
            <input type="number" id="numUp" value="5" min="0">
        </div>
        <div class="slider-group">
            <label data-i18n="mid">Medio:</label>
            <input type="range" id="slideMid" min="0" max="100" value="3">
            <input type="number" id="numMid" value="3" min="0">
        </div>
        <div class="slider-group">
            <label data-i18n="down">Abajo:</label>
            <input type="range" id="slideDown" min="0" max="100" value="5">
            <input type="number" id="numDown" value="5" min="0">
        </div>
    </div>

    <div class="buttons">
        <button id="btnGenerar" onclick="generarZalgo()" data-i18n="btnGenerate">¡Generar Zalgo!</button>
        <button onclick="copiarTexto()" data-i18n="btnCopy">Copiar Resultado</button>
        <button onclick="toggleOpciones()" class="btn-secondary" data-i18n="btnOptions">Opciones de Caracteres</button>
    </div>

    <div class="options-panel" id="optionsPanel">
        <p style="font-size: 14px; margin-top: 0;" data-i18n="optionsDesc">Selecciona qué caracteres quieres habilitar para la generación. ¡Se actualiza en tiempo real!</p>
        <div id="charOptionsContainer"></div>
    </div>
</div>

<script>
    const i18n = {
        es: {
            title: "G̸E̵N̸E̵R̶A̵D̷O̵R̶ ̶Z̷A̵L̸G̷O̵",
            normalText: "Texto Normal:",
            normalPh: "Escribe aquí el texto...",
            zalgoText: "Texto Zalgo:",
            zalgoPh: "A̵q̸u̷í̷ ̸a̵p̵a̵r̵e̷c̷e̶ ̴l̶a̷ ̷m̶a̷g̷i̶a̴.̶.̷.̸",
            overlap: "Desbordar",
            overlapTitle: "Permite que el texto rompa los límites de la caja",
            realtime: "Tiempo real",
            realtimeTitle: "Actualiza el texto automáticamente al cambiar algo",
            up: "Arriba:",
            mid: "Medio:",
            down: "Abajo:",
            btnGenerate: "¡Generar Zalgo!",
            btnCopy: "Copiar Resultado",
            btnOptions: "Opciones de Caracteres",
            optionsDesc: "Selecciona qué caracteres quieres habilitar para la generación. ¡Se actualiza en tiempo real!",
            generating: "Generando...",
            copied: "¡Copiado!",
            catUp: "Zalgo Arriba",
            catMid: "Zalgo Medio",
            catDown: "Zalgo Abajo",
            selectAll: "Marcar todo",
            deselectAll: "Desmarcar todo"
        },
        en: {
            title: "U̶L̵T̷I̵M̸A̵T̷E̶ ̵Z̶A̵L̷G̸O̵",
            normalText: "Normal Text:",
            normalPh: "Type your text here...",
            zalgoText: "Zalgo Text:",
            zalgoPh: "M̵a̸g̷i̷c̸ ̵h̵a̵p̵p̵e̷n̷s̶ ̴h̶e̷r̷e̴.̶.̷.̸",
            overlap: "Overflow",
            overlapTitle: "Allows text to break the box limits",
            realtime: "Real-time",
            realtimeTitle: "Updates text automatically on any change",
            up: "Up:",
            mid: "Middle:",
            down: "Down:",
            btnGenerate: "Generate Zalgo!",
            btnCopy: "Copy Result",
            btnOptions: "Character Options",
            optionsDesc: "Select which characters you want to enable. It updates in real-time!",
            generating: "Generating...",
            copied: "Copied!",
            catUp: "Zalgo Up",
            catMid: "Zalgo Middle",
            catDown: "Zalgo Down",
            selectAll: "Select all",
            deselectAll: "Deselect all"
        }
    };

    let currentLang = 'es';

    const zalgoChars = {
        up: ['\u030d', '\u030e', '\u0304', '\u0305', '\u033f', '\u0311', '\u0306', '\u0310', '\u0352', '\u0351', '\u030a', '\u032b', '\u0353', '\u0302', '\u030c', '\u0300', '\u0301', '\u030b', '\u030f', '\u0312', '\u0313', '\u0314', '\u033d', '\u0309', '\u0363', '\u0364', '\u0365', '\u0366', '\u0367', '\u0368', '\u0369', '\u036a', '\u036b', '\u036c', '\u036d', '\u036e', '\u036f', '\u033e', '\u035b', '\u0346', '\u031a'],
        down: ['\u0316', '\u0317', '\u0318', '\u0319', '\u031c', '\u031d', '\u0320', '\u0324', '\u0325', '\u0326', '\u0329', '\u032a', '\u032b', '\u032c', '\u032d', '\u032e', '\u032f', '\u0330', '\u0331', '\u0332', '\u0333', '\u0339', '\u033a', '\u033b', '\u033c', '\u0345', '\u0347', '\u0348', '\u0349', '\u034d', '\u034e', '\u0353', '\u0354', '\u0355', '\u0356', '\u0359', '\u035a', '\u0323'],
        mid: ['\u0315', '\u031b', '\u0340', '\u0341', '\u0358', '\u0321', '\u0322', '\u0327', '\u0328', '\u0334', '\u0335', '\u0336', '\u034f', '\u035c', '\u035d', '\u035e', '\u035f', '\u0360', '\u0362', '\u0338', '\u0337', '\u0361', '\u0489']
    };

    let enabledChars = {
        up: [...zalgoChars.up], down: [...zalgoChars.down], mid: [...zalgoChars.mid]
    };

    let debounceTimeout;

    function initLanguage() {
        const langs = navigator.languages || [navigator.language || navigator.userLanguage];
        let lang = 'en';
        
        for (let l of langs) {
            if (l && l.toLowerCase().startsWith('es')) {
                lang = 'es';
                break;
            }
        }
        
        document.getElementById('langSelector').value = lang;
        changeLanguage(lang);
    }

    window.changeLanguage = function(lang) {
        currentLang = lang;
        document.documentElement.lang = lang;

        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.getAttribute('data-i18n');
            if (i18n[lang][key]) el.innerText = i18n[lang][key];
        });

        document.querySelectorAll('[data-i18n-ph]').forEach(el => {
            const key = el.getAttribute('data-i18n-ph');
            if (i18n[lang][key]) el.placeholder = i18n[lang][key];
        });

        document.getElementById('overlapWrapper').title = i18n[lang].overlapTitle;
        document.getElementById('realtimeWrapper').title = i18n[lang].realtimeTitle;

        buildOptions();
        checkRealtimeUpdate();
    }

    function checkRealtimeUpdate() {
        const isRealtime = document.getElementById('realtimePreview').checked;
        const btnGenerar = document.getElementById('btnGenerar');
        
        if (isRealtime) {
            btnGenerar.style.opacity = '0.5';
            btnGenerar.innerText = i18n[currentLang].generating;
            
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => {
                generarZalgo();
            }, 100); 
        } else {
            btnGenerar.style.opacity = '1';
            btnGenerar.innerText = i18n[currentLang].btnGenerate;
        }
    }

    function syncInputs(slideId, numId) {
        const slider = document.getElementById(slideId);
        const number = document.getElementById(numId);

        slider.addEventListener('input', () => {
            number.value = slider.value;
            checkRealtimeUpdate();
        });
        
        number.addEventListener('input', () => {
            slider.value = number.value; 
            checkRealtimeUpdate();
        });
    }

    syncInputs('slideUp', 'numUp');
    syncInputs('slideMid', 'numMid');
    syncInputs('slideDown', 'numDown');

    document.getElementById('inputText').addEventListener('input', checkRealtimeUpdate);
    document.getElementById('realtimePreview').addEventListener('change', checkRealtimeUpdate);

    function buildOptions() {
        const container = document.getElementById('charOptionsContainer');
        container.innerHTML = '';
        const categories = [
            { id: 'up', name: i18n[currentLang].catUp }, 
            { id: 'mid', name: i18n[currentLang].catMid },
            { id: 'down', name: i18n[currentLang].catDown }
        ];

        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = 'char-category';
            
            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `
                <h3>${cat.name}</h3>
                <div class="category-actions">
                    <button onclick="toggleAllInCategory('${cat.id}', true)">${i18n[currentLang].selectAll}</button>
                    <button onclick="toggleAllInCategory('${cat.id}', false)">${i18n[currentLang].deselectAll}</button>
                </div>
            `;
            div.appendChild(header);

            const grid = document.createElement('div');
            grid.className = 'char-grid';

            zalgoChars[cat.id].forEach((char, index) => {
                const item = document.createElement('div');
                item.className = 'char-item';
                const displayChar = (cat.id === 'up' || cat.id === 'mid' || cat.id === 'down') ? 'A' + char : char;
                const isChecked = enabledChars[cat.id].includes(char) ? 'checked' : '';

                item.innerHTML = `
                    <input type="checkbox" id="char_${cat.id}_${index}" ${isChecked} 
                           onchange="updateCharStatus('${cat.id}', ${index}, this.checked)">
                    <label style="cursor:pointer; width:100%" for="char_${cat.id}_${index}"><span>${displayChar}</span></label>
                `;
                grid.appendChild(item);
            });
            div.appendChild(grid);
            container.appendChild(div);
        });
    }

    window.toggleAllInCategory = function(category, isSelectAll) {
        if (isSelectAll) {
            enabledChars[category] = [...zalgoChars[category]];
        } else {
            enabledChars[category] = [];
        }
        
        const checkboxes = document.querySelectorAll(`input[id^="char_${category}_"]`);
        checkboxes.forEach(cb => cb.checked = isSelectAll);
        
        checkRealtimeUpdate();
    };

    window.updateCharStatus = function(category, index, isChecked) {
        const char = zalgoChars[category][index];
        if (isChecked) {
            if (!enabledChars[category].includes(char)) {
                enabledChars[category].push(char);
            }
        } else {
            enabledChars[category] = enabledChars[category].filter(c => c !== char);
        }
        checkRealtimeUpdate();
    };

    window.toggleOpciones = function() {
        const panel = document.getElementById('optionsPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    window.generarZalgo = function() {
        const text = document.getElementById('inputText').value;
        const numUp = parseInt(document.getElementById('numUp').value) || 0;
        const numMid = parseInt(document.getElementById('numMid').value) || 0;
        const numDown = parseInt(document.getElementById('numDown').value) || 0;

        let result = '';
        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];

        for (let i = 0; i < text.length; i++) {
            const char = text[i];
            if (char === '\n') {
                result += char;
                continue;
            }

            result += char;

            if (char === ' ') continue;

            if (enabledChars.up.length > 0) {
                for (let j = 0; j < numUp; j++) result += rand(enabledChars.up);
            }
            if (enabledChars.mid.length > 0) {
                for (let j = 0; j < numMid; j++) result += rand(enabledChars.mid);
            }
            if (enabledChars.down.length > 0) {
                for (let j = 0; j < numDown; j++) result += rand(enabledChars.down);
            }
        }
        document.getElementById('outputText').value = result;
        document.getElementById('outputOverlay').innerText = result;
    }

    window.toggleOverlap = function() {
        const isOverlap = document.getElementById('overlapToggle').checked;
        const textarea = document.getElementById('outputText');
        const overlay = document.getElementById('outputOverlay');
        
        if (isOverlap) {
            textarea.classList.add('text-transparent');
            overlay.style.display = 'block';
        } else {
            textarea.classList.remove('text-transparent');
            overlay.style.display = 'none';
        }
    }

    document.getElementById('outputText').addEventListener('scroll', function() {
        const overlay = document.getElementById('outputOverlay');
        overlay.style.transform = `translateY(-${this.scrollTop}px)`;
    });

    window.copiarTexto = function() {
        const out = document.getElementById('outputText');
        out.select();
        document.execCommand('copy');
        
        const btn = event.target;
        btn.innerText = i18n[currentLang].copied;
        btn.style.backgroundColor = "#4caf50";
        btn.style.color = "white";
        setTimeout(() => {
            btn.innerText = i18n[currentLang].btnCopy;
            btn.style.backgroundColor = "";
            btn.style.color = "";
        }, 1500);
    }

    initLanguage();

</script>
</body>
</html>
